<!DOCTYPE html>
<html>
<head>
  <title>Grievance System</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    .container {
      display: flex;
      gap: 10px;
      padding: 20px;
      height: 90vh;
    }

    .panel {
      flex: 1;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      overflow-y: auto;
    }

    input, button {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    #chat-box {
      height: 300px;
      overflow-y: auto;
      background: #0f172a;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .msg {
      padding: 6px;
      margin: 5px 0;
      border-radius: 6px;
    }

    .user { background: #22c55e; text-align: right; }
    .bot { background: #334155; }
  </style>
</head>

<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="loginBox" style="text-align:center; margin-top:100px;">
  <h2>Login</h2>

  <input id="username" placeholder="Username">
  <br><br>

  <input id="password" type="password" placeholder="Password">
  <br><br>

  <button onclick="login()">Login</button>

  <p id="loginMsg"></p>
</div>

<!-- 🔓 MAIN APP (HIDDEN FIRST) -->
<div id="app" style="display:none;">

  <div class="container">

    <!-- CHAT -->
    <div class="panel">
      <h3>💬 Complaint Chat</h3>

      <div id="chat-box"></div>

      <input id="text" placeholder="Type complaint..." />
      <button onclick="sendMessage()">Send</button>
    </div>

    <!-- DASHBOARD -->
    <div class="panel">
      <h3>📋 Dashboard</h3>

      <button onclick="loadComplaints()">Refresh</button>

      <div id="list"></div>
    </div>

  </div>

</div>

<!-- JS -->
<script src="app.js"></script>

<!-- 🔐 LOGIN FUNCTION (needed here OR in app.js) -->
<script>
async function login() {
  let username = document.getElementById("username").value;
  let password = document.getElementById("password").value;

  let res = await fetch("https://faithful-kindness-production.up.railway.app/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ username, password })
  });

  if (res.ok) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    document.getElementById("loginMsg").innerText = "Invalid login";
  }
}
</script>

</body>
</html>
